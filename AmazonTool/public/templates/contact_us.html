{% extends "base1.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/public/contact_us.css' %}">
{% endblock %}

{% block content %}
<section class="contact-hero-section">
    <div class="contact-hero-container">
        <h1 class="contact-hero-title">Get In Touch</h1>
        <p class="contact-hero-subtitle">
            Have questions about ProfitLens? We'd love to hear from you. Send us a message and we'll respond as soon as possible.
        </p>
    </div>
</section>
<section class="form-layout-section">
    <div class="form-container-card">
        <form method="POST" action="">
            {% csrf_token %}
            
            <!-- Row 1: Name & Email -->
            <div class="form-grid-row">
                <div class="form-field-group">
                    <label for="id_name">Name *</label>
                    <input type="text" id="id_name" name="name" placeholder="Your name" required>
                </div>
                <div class="form-field-group">
                    <label for="id_email">Email *</label>
                    <input type="email" id="id_email" name="email" placeholder="your@email.com" required>
                </div>
            </div>

            <!-- Row 2: Company & Phone -->
            <div class="form-grid-row">
                <div class="form-field-group">
                    <label for="id_company">Company</label>
                    <input type="text" id="id_company" name="company" placeholder="Your company">
                </div>
                <div class="form-field-group">
                    <label for="id_phone">Phone</label>
                    <input type="tel" id="id_phone" name="phone" placeholder="(123) 456-7890">
                </div>
            </div>

            <!-- Row 3: Subject -->
            <div class="form-field-group full-width-field">
                <label for="id_subject">Subject *</label>
                <div class="select-wrapper">
                    <select id="id_subject" name="subject" required>
                        <option value="" disabled selected hidden>Select a subject</option>
                        <option value="general">General Inquiry</option>
                        <option value="sales">Sales & Demo Request</option>
                        <option value="support">Technical Support</option>
                        <option value="billing">Billing & Account</option>
                    </select>
                </div>
            </div>

            <!-- Row 4: Message -->
            <div class="form-field-group full-width-field">
                <label for="id_message">Message *</label>
                <textarea id="id_message" name="message" rows="6" placeholder="How can we help you?" required></textarea>
            </div>

            <!-- Submit Button Row -->
            <div class="form-action-row">
                <button type="submit" class="btn-submit">Send Message</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
