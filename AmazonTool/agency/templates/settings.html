{% extends "base.html" %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static "css/agency/settings.css" %}">
{% endblock  %}

{% block content %}

<div class="settings_container">
    <!-- Top Configuration Header Block -->
    <header class="pl-page-header">
        <div>
            <h1>Agency Settings</h1>
            <p>Configure your agency preferences</p>
        </div>
    </header>

    <!-- Settings Dashboard Card Container -->
    <section class="pl-card">
        <form class="pl-settings-form" method="POST" action="">
            {% csrf_token %}

            <!-- Agency Name Field -->
            <div class="pl-form-group">
                <label for="agency_name">Agency Name</label>
                <input type="text" id="agency_name" name="agency_name" class="pl-input-text" value="ProfitLens Agency">
            </div>

            <!-- Default Plan Selection Group -->
            <div class="pl-form-group">
                <label for="default_plan">Default Plan for New Accounts</label>
                <select id="default_plan" name="default_plan" class="pl-select-custom">
                    <option value="starter">Starter</option>
                    <option value="professional" selected>Professional</option>
                    <option value="enterprise">Enterprise</option>
                </select>
            </div>

            <!-- Auto Sync Action Checkbox Toggle -->
            <div class="pl-checkbox-group">
                <input type="checkbox" id="auto_sync" name="auto_sync" class="pl-checkbox-custom" checked>
                <div class="pl-checkbox-label-block">
                    <label for="auto_sync" class="pl-checkbox-title">Auto-Sync Client Data</label>
                    <span class="pl-checkbox-desc">Automatically pull data from connected accounts</span>
                </div>
            </div>

            <!-- Sync Interval Selection Group -->
            <div class="pl-form-group">
                <label for="sync_interval">Sync Interval (Minutes)</label>
                <select id="sync_interval" name="sync_interval" class="pl-select-custom">
                    <option value="5">Every 5 minutes</option>
                    <option value="15" selected>Every 15 minutes</option>
                    <option value="30">Every 30 minutes</option>
                    <option value="60">Every hour</option>
                </select>
            </div>

            <!-- Submit Action -->
            <button type="submit" class="pl-btn pl-btn-success" style="background-color: #10b981; color: #ffffff;">
                <!-- Inline Document Vector Asset to maintain perfect alignment -->
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 6px;">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                    <polyline points="7 3 7 8 15 8"></polyline>
                </svg>
                <span style="vertical-align: middle;">Save Settings</span>
            </button>
        </form>
    </section>
</div>
{% endblock %}
