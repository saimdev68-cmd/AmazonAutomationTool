{% extends "base_auth.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="profitlens-login-wrapper">
    <div class="login-container">
        
        <div class="login-card">

            <div class="page-header">
                <h1>Welcome Back</h1>
                <p>Please enter your details to sign into your account</p>
            </div>

            <form action="" method="post" class="form-group-stack">
                {% csrf_token %}
                
                <div class="django-form-fields">
                    {# Django renders email and password here #}
                    {{ form.as_p }}
                </div>
                
                <button type="submit" class="btn-submit">Login</button>
            </form>
            <div class="login-footer-links">
                <a href="{% url 'signup' %}" class="auth-link">Create an account</a>
                <span class="link-divider">•</span>
                <a href="{% url 'password_reset' %}" class="auth-link">Forgot Password?</a>
            </div>
        </div>


    </div>
</div>
{% endblock %}
