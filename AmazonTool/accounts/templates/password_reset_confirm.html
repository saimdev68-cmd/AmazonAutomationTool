{% extends "base_auth.html" %}

{% block title %}Confirm New Password{% endblock %}

{% block content %}
<div class="profitlens-login-wrapper">
    <div class="login-container">

        <div class="login-card">
            <div class="page-header">
                <h1>Set New Password</h1>
                <p>Please enter and confirm your new secure password below.</p>
            </div>
            <form action="" method="post" class="form-group-stack">
                {% csrf_token %}
                
                <div class="django-form-fields">
                    {# Django renders password1 and password2 here #}
                    {{ form.as_p }}
                </div>
                
                <button type="submit" class="btn-submit">Save New Password</button>
            </form>
            <div class="form-footer" style="text-align: center;">
                <a href="{% url 'login' %}" class="auth-link">Back to login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
