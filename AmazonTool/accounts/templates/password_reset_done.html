{% extends "base_auth.html" %}

{% block title %}Email Sent{% endblock %}

{% block content %}
<div class="profitlens-login-wrapper">
    <div class="login-container">
        
        <div class="login-card" style="text-align: center;">
            
            <div class="success-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="success-checkmark">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
            </div>

            <div class="page-header" style="margin-bottom: 24px;">
                <h1>Check Your Email</h1>
                <p>We have sent a secure password reset link to your email address. Please check your inbox and spam folder.</p>
            </div>

            <a href="{% url 'login' %}" class="btn-submit" style="text-decoration: none;">Return to Login</a>
        </div>

    </div>
</div>
{% endblock %}
